<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health & Spending Tracker</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    nav {
      background: #222;
      padding: 10px;
      display: flex;
      gap: 10px;
    }

    nav button {
      padding: 10px;
      border: none;
      cursor: pointer;
      background: #444;
      color: white;
    }

    nav button:hover {
      background: #666;
    }

    .tab {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button.action {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('gain')">Calories Gained</button>
  <button onclick="showTab('lost')">Calories Lost</button>
  <button onclick="showTab('schedule')">Schedule</button>
  <button onclick="showTab('settings')">Settings</button>
</nav>

<!-- HOME -->
<section id="home" class="tab active">
  <h2>Dashboard</h2>

  <div class="card">
    <h3>Calories Overview</h3>
    <canvas id="calorieChart"></canvas>
  </div>

  <div class="card">
    <h3>Monthly Spending</h3>
    <canvas id="spendingChart"></canvas>
  </div>

  <div class="card">
    <h3>Monthly Savings Goals</h3>
    <div id="savingsGoals"></div>
  </div>
</section>

<!-- GAIN -->
<section id="gain" class="tab">
  <h2>Calories Gained</h2>

  <input id="food" placeholder="Food name">
  <input id="calories" type="number" placeholder="Calories">
  <input id="money" type="number" placeholder="Cost ($)">

  <button class="action" onclick="addGain()">Add</button>

  <ul id="gainList"></ul>
</section>

<!-- LOST -->
<section id="lost" class="tab">
  <h2>Calories Lost</h2>

  <input id="activity" placeholder="Activity">
  <input id="burned" type="number" placeholder="Calories burned">

  <button class="action" onclick="addLost()">Add</button>

  <ul id="lostList"></ul>

  <p style="color:gray;">
    Tip: You can track activity using Apple Health or Google Fit.
  </p>
</section>

<!-- SCHEDULE -->
<section id="schedule" class="tab">
  <h2>Schedule</h2>

  <input id="event" placeholder="Event name">
  <input id="date" type="date">

  <button class="action" onclick="addEvent()">Add</button>

  <ul id="scheduleList"></ul>
</section>

<!-- SETTINGS -->
<section id="settings" class="tab">
  <h2>Settings</h2>

  <button class="action" onclick="toggleDark()">Toggle Dark Mode</button>

  <h3>Monthly Savings Goal</h3>

  <input id="monthInput" type="month">
  <input id="savingsGoal" type="number" placeholder="Target ($)">

  <button class="action" onclick="setSavingsGoal()">Set Goal</button>

  <div id="goalsDisplay"></div>
</section>

<script src="script.js"></script>
</body>
</html>
